<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOT — Deck</title>

  <!-- Fonts: Onest (UI/display) + IBM Plex Mono (labels/counter) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <!-- p5.js -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>

  <style>
    :root {
      --page: #ffffff;
      --ink: #0b1620;
      --accent: #007AFF;
      --warm-red: #fc7981;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--page);
      font-family: "Onest", system-ui, -apple-system, sans-serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    #stage { position: fixed; inset: 0; }
    canvas { display: block; }

    /* Speaker-notes overlay (toggle with 'n') */
    #notes {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      padding: 24px 28px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      border-top: 1px solid rgba(11, 22, 32, 0.06);
      font-size: 15px;
      line-height: 1.55;
      color: var(--ink);
      transform: translateY(110%);
      transition: transform 0.45s cubic-bezier(0.2, 0.9, 0.25, 1);
      pointer-events: none;
      z-index: 20;
    }
    #notes.show { transform: translateY(0); }
    #notes .label {
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(11, 22, 32, 0.4);
      margin-bottom: 8px;
    }

    /* Beat counter (faint mono) */
    #counter {
      position: fixed;
      right: 22px;
      bottom: 18px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      color: rgba(11, 22, 32, 0.22);
      z-index: 10;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="stage"></div>
  <div id="notes"><div class="label">Speaker note</div><div id="notes-body"></div></div>
  <div id="counter">00 / 00</div>

  <!-- Scene registry must exist before scene files push into it -->
  <script>window.SCENES = window.SCENES || [];</script>

  <!-- Shared helpers + the shell live in helpers.js / shell.js -->
  <script src="shared/helpers.js"></script>

  <!-- Scenes (order = beat order = window.SCENES push order).
       THE TIGHT CUT — ~half, ~12 beats, fast enough to leave time for the
       live demo. You narrate the full idea; the screen holds a short anchor
       (see captions.js). To restore the full journey, uncomment the PARKED
       block below. -->
  <script src="scenes/03-cold-call.js"></script>
  <script src="scenes/07-afraid.js"></script>
  <script src="scenes/08-normal.js"></script>
  <script src="scenes/09-everywhere.js"></script>
  <script src="scenes/15-two-truths.js"></script>
  <script src="scenes/18-chatgpt.js"></script>
  <script src="scenes/19-youre-right.js"></script>
  <script src="scenes/20-dot-appears.js"></script>
  <script src="scenes/21-both-truths.js"></script>
  <script src="scenes/22-checkins.js"></script>
  <script src="scenes/26-to-a-human.js"></script>
  <script src="scenes/27-close.js"></script>

  <!-- PARKED (the long-cut beats — uncomment any to add it back, in order) --
  <script src="scenes/01-age-20.js"></script>
  <script src="scenes/02-age-50.js"></script>
  <script src="scenes/06-expected.js"></script>
  <script src="scenes/10-a-story.js"></script>
  <script src="scenes/11-unexplained.js"></script>
  <script src="scenes/12-mask.js"></script>
  <script src="scenes/13-story-matters.js"></script>
  <script src="scenes/14-happened-matters.js"></script>
  <script src="scenes/16-courage.js"></script>
  <script src="scenes/17-mislabeled.js"></script>
  <script src="scenes/23-own-it.js"></script>
  <script src="scenes/24-for-who.js"></script>
  <script src="scenes/25-right-one.js"></script>
  -->


  <!-- The headliner words (one place to edit every on-screen line). Loads
       after the scenes, before the shell, which reads window.CAPTIONS. -->
  <script src="captions.js"></script>

  <!-- Shell boots last: it reads window.SCENES and drives the canvas. -->
  <script src="shared/shell.js"></script>
</body>
</html>
